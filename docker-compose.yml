version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 3s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    ports:
      - "${PORT}:${PORT}"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80" # Maps localhost:5173 to Nginx port 80
    depends_on:
      - api # Wait for Go API to start
    environment:
      # Pass the backend URL to Vite at build time
      - VITE_API_URL=http://localhost:8080

volumes:
  pgdata: