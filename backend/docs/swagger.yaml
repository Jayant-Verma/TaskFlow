basePath: /
definitions:
  handlers.LoginInput:
    properties:
      email:
        example: john@example.com
        type: string
      password:
        example: securepassword123
        type: string
    type: object
  handlers.ProjectInput:
    properties:
      description:
        example: Overhaul of the main landing page
        type: string
      name:
        example: Website Redesign
        type: string
    type: object
  handlers.RegisterInput:
    properties:
      email:
        example: john@example.com
        type: string
      name:
        example: John Doe
        type: string
      password:
        example: securepassword123
        type: string
    type: object
  handlers.TaskCreateInput:
    properties:
      assignee_id:
        example: uuid-of-user
        type: string
      description:
        example: Create the ERD for the new feature
        type: string
      due_date:
        example: "2025-12-31"
        type: string
      title:
        example: Design Database Schema
        type: string
    type: object
  handlers.TaskUpdateInput:
    properties:
      assignee_id:
        type: string
      description:
        type: string
      due_date:
        type: string
      priority:
        enum:
        - low
        - medium
        - high
        type: string
      status:
        enum:
        - todo
        - in_progress
        - done
        type: string
      title:
        type: string
    type: object
  models.Project:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      owner_id:
        type: string
    type: object
  models.Task:
    properties:
      assignee_id:
        type: string
      description:
        type: string
      due_date:
        type: string
      id:
        type: string
      priority:
        type: string
      project_id:
        type: string
      status:
        type: string
      title:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: A minimal, robust task management REST API.
  title: TaskFlow API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and returns a 24-hour JWT access token.
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: Returns access_token
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties: true
            type: object
      summary: Login a user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account with a hashed password.
      parameters:
      - description: Registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterInput'
      produces:
      - application/json
      responses:
        "201":
          description: Returns the new user ID
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Validation failed or email exists
          schema:
            additionalProperties: true
            type: object
      summary: Register a new user
      tags:
      - auth
  /projects:
    get:
      consumes:
      - application/json
      description: Retrieves all projects the current user owns or has tasks assigned
        in.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Project'
            type: array
        "401":
          description: Unauthenticated
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List projects
      tags:
      - projects
    post:
      consumes:
      - application/json
      description: Creates a new project owned by the current user.
      parameters:
      - description: Project details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.ProjectInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Project'
        "400":
          description: Validation failed
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthenticated
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a project
      tags:
      - projects
  /projects/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes a project and all associated tasks. Only the owner can
        do this.
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "403":
          description: Unauthorized action or not found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete a project
      tags:
      - projects
    get:
      consumes:
      - application/json
      description: Retrieves project details and a summary of its tasks.
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Contains 'project' and 'tasks' array
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get a project
      tags:
      - projects
    patch:
      consumes:
      - application/json
      description: Updates project details. Only the owner can do this.
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      - description: Updated fields (optional)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.ProjectInput'
      produces:
      - application/json
      responses:
        "200":
          description: Status updated
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Unauthorized action or not found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update a project
      tags:
      - projects
  /projects/{id}/stats:
    get:
      consumes:
      - application/json
      description: Returns task counts grouped by status.
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Contains status_counts map
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Project Task Stats
      tags:
      - projects
  /projects/{id}/tasks:
    get:
      consumes:
      - application/json
      description: Lists tasks for a specific project with optional pagination and
        filtering.
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      - description: Filter by status
        enum:
        - todo
        - in_progress
        - done
        in: query
        name: status
        type: string
      - description: Filter by Assignee UUID
        in: query
        name: assignee
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 50
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Task'
            type: array
      security:
      - BearerAuth: []
      summary: List tasks
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: Creates a new task within a specific project.
      parameters:
      - description: Project UUID
        in: path
        name: id
        required: true
        type: string
      - description: Task details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.TaskCreateInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Task'
        "400":
          description: Validation failed
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create a task
      tags:
      - tasks
  /tasks/{id}:
    delete:
      consumes:
      - application/json
      description: Deletes a task. Only the task creator or the project owner can
        do this.
      parameters:
      - description: Task UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "403":
          description: Unauthorized action or not found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete a task
      tags:
      - tasks
    patch:
      consumes:
      - application/json
      description: Updates a task dynamically based on provided JSON fields.
      parameters:
      - description: Task UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.TaskUpdateInput'
      produces:
      - application/json
      responses:
        "200":
          description: Status updated
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid fields
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update a task
      tags:
      - tasks
securityDefinitions:
  BearerAuth:
    description: Type "Bearer " followed by your token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
